version: '3.8'

services:
  # ─── MySQL Database ──────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: planstack-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Bhagavathi@24
      MYSQL_DATABASE: project_management_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ─────────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: planstack-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DATABASE_URL: "mysql://root:Bhagavathi%4024@db:3306/project_management_db"
      JWT_SECRET: "a7f3b9c1d4e8f2a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8"
      JWT_EXPIRES_IN: "7d"
      GOOGLE_CLIENT_ID: "1013114427096-jgqdtvif7rlgt06jfjjqa0ujln5igu7c.apps.googleusercontent.com"
      CLIENT_URL: "http://localhost"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push --skip-generate && node src/server.js"

  # ─── Frontend (Nginx) ───────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: planstack-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
